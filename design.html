<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Integrated Vengeance Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500&family=Instrument+Serif&display=swap');
        
        body { 
            font-family: 'Instrument Sans', sans-serif; 
            background-color: #000; 
            color: white; 
            margin: 0; 
            overflow: hidden; 
        }

        .aurora-bg {
            background-image: repeating-linear-gradient(100deg, #000 0%, #000 7%, transparent 10%, transparent 12%, #000 16%), 
                              repeating-linear-gradient(100deg, #60a5fa 10%, #e879f9 15%, #60a5fa 20%, #5eead4 25%, #60a5fa 30%);
            background-size: 300% 200%;
            filter: blur(20px) saturate(200%);
            animation: aurora 20s linear infinite;
        }

        @keyframes aurora {
            0% { background-position: 50% 50%; }
            100% { background-position: 350% 50%; }
        }

        .elastic-item { 
            transition: all 0.5s cubic-bezier(0.18, 0.89, 0.32, 1.28); 
        }
    </style>
</head>
<body>

    <!-- Notch Navbar -->
    <header class="fixed top-0 inset-x-0 z-50 h-16 flex px-0">
        <div class="flex-1 h-10 bg-black/50 backdrop-blur-md border-b border-white/5"></div>
        <div class="flex h-16 relative shrink-0">
            <div class="w-[50px] h-full bg-black/50 backdrop-blur-md" style="clip-path: path('M0 0 H50 V64 C25 64 25 40 0 40 Z')"></div>
            <div class="flex-1 h-full bg-black/50 backdrop-blur-md flex items-center justify-center px-8 border-b border-white/5 font-bold tracking-[0.2em] text-xs">DASHBOARD</div>
            <div class="w-[50px] h-full bg-black/50 backdrop-blur-md" style="clip-path: path('M0 0 H50 V40 C25 40 25 64 0 64 Z')"></div>
        </div>
        <div class="flex-1 h-10 bg-black/50 backdrop-blur-md border-b border-white/5"></div>
    </header>

    <!-- Aurora Background -->
    <div class="aurora-bg absolute inset-0 z-0 opacity-50"></div>

    <!-- Main Content -->
    <main class="relative z-10 w-screen h-screen flex flex-col items-center justify-center">
        
        <!-- Clock Card -->
        <div class="backdrop-blur-xl bg-white/5 border border-white/10 p-12 rounded-3xl text-center shadow-2xl">
            <div id="clock" class="text-8xl md:text-9xl font-bold tracking-tighter tabular-nums" style="font-family: 'Instrument Serif', serif;">
                00:00:00
            </div>
            <p class="mt-4 text-white/40 uppercase tracking-[0.4em] text-[10px]">System Status: Online</p>
        </div>

        <!-- Elastic Stack -->
        <div id="stack" class="flex items-center justify-center cursor-pointer mt-12"></div>

    </main>

    <script>
        // Clock
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').textContent = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        }
        setInterval(updateClock, 1000);
        updateClock();

        // Elastic Stack
        const stackEl = document.getElementById('stack');
        const items = [1, 2, 3, 4, 5];

        function renderStack(hoverIndex = null) {
            stackEl.innerHTML = '';
            items.forEach((item, i) => {
                const div = document.createElement('div');
                div.className = "elastic-item w-16 h-16 rounded-full bg-white/10 border border-white/20 flex items-center justify-center font-bold backdrop-blur-md";
                
                let x = 0;
                let scale = 1;
                if (hoverIndex !== null) {
                    if (i > hoverIndex) x = 20;
                    else if (i < hoverIndex) x = -20;
                    else { scale = 1.3; }
                }

                div.style.marginLeft = i === 0 ? '0' : '-20px';
                div.style.transform = `translateX(${x}px) scale(${scale})`;
                div.style.zIndex = (hoverIndex === i) ? 10 : i;
                div.textContent = item;

                div.onmouseenter = () => renderStack(i);
                div.onmouseleave = () => renderStack(null);
                
                stackEl.appendChild(div);
            });
        }
        renderStack();
    </script>
</body>
</html>
