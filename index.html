<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIO Service Request System</title>
    <style>
        :root {
            --mio-green: #007632;
            --mio-orange: #f28b00;
            --mio-black: #000000;
            --bg-color: #f4f6f8;
            --card-bg: #ffffff;
            --text-primary: #333333;
            --text-secondary: #555555;
            --border-color: #cccccc;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Arial', sans-serif; }

        body { background-color: var(--bg-color); padding: 2rem; }

        .app-container {
            max-width: 1000px; margin: 0 auto; background-color: var(--card-bg);
            padding: 3rem; border-top: 6px solid var(--mio-green);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        /* Animations */
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .view { display: none; animation: slideUp 0.4s ease-out; }
        .view.active { display: block; }

        /* Buttons & Interactions */
        button { cursor: pointer; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .action-btn:hover { transform: scale(1.05); }

        .modal {
            display: none; position: fixed; z-index: 1000; left: 0; top: 0;
            width: 100%; height: 100%; background-color: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px); /* Glassmorphism effect */
            animation: fadeIn 0.3s;
        }

        .modal-content {
            background-color: var(--card-bg); margin: 5% auto; padding: 2.5rem;
            width: 90%; max-width: 700px; border-top: 6px solid var(--mio-green);
            animation: slideUp 0.5s ease;
        }

        /* --- Your existing CSS remains mostly the same, just adding the above --- */
        .tabs button { background: transparent; border: 1px solid var(--border-color); padding: 0.6rem 1.5rem; }
        .tabs button.active { background: var(--mio-green); color: #fff; }
        
        .submit-btn { background-color: var(--mio-green); color: #fff; border: none; padding: 0.8rem 2rem; }
        .print-btn { background-color: var(--mio-orange); color: #fff; border: none; padding: 0.8rem 2rem; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        th, td { padding: 1rem; border-bottom: 1px solid #eee; text-align: left; }
        tr { transition: background 0.2s; }
        tr:hover { background-color: #f9f9f9; }

        @media print {
            .modal { background: none; backdrop-filter: none; }
            .modal-content { border: none; box-shadow: none; }
            .no-print { display: none !important; }
        }
    </style>
</head>
<body>

    <div class="app-container">
        <header>
            <h1>Service Request Form</h1>
            <nav class="tabs">
                <button id="btn-submit-tab" class="active" onclick="switchTab('submit')">Submit Request</button>
                <button id="btn-manage-tab" onclick="switchTab('manage')">Manage Records</button>
            </nav>
        </header>

        <section id="submit-view" class="view active">
            <form id="requestForm">
                <input type="hidden" id="recordId">
                <div class="form-row">
                    <div class="input-group"><label>Date</label><input type="date" id="reqDate" required></div>
                    <div class="input-group"><label>Control No.</label><input type="text" id="controlNo"></div>
                </div>
                <div class="input-group"><label>Office</label><input type="text" id="officeName" required></div>
                <h3>Type of Request</h3>
                <div class="checkbox-grid">
                    <!-- Checkboxes as per your original code -->
                    <label><input type="checkbox" name="reqType" value="Graphic Layouting"> Graphic Layouting</label>
                    <label><input type="checkbox" name="reqType" value="Printing"> Printing</label>
                    <label><input type="checkbox" name="reqType" value="Video Editing"> Video Editing</label>
                    <label><input type="checkbox" name="reqType" id="othersCheck" value="Others"> Others: <input type="text" id="othersText"></label>
                </div>
                <div class="btn-group">
                    <button type="submit" class="submit-btn" id="formSubmitBtn">Save Record</button>
                </div>
            </form>
        </section>

        <section id="manage-view" class="view">
            <h2>Record Database</h2>
            <table>
                <thead><tr><th>Control No</th><th>Date</th><th>Actions</th></tr></thead>
                <tbody id="tableBody"></tbody>
            </table>
        </section>
    </div>

    <div id="viewModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <div id="modalDetails"></div>
            <button class="print-btn no-print" onclick="window.print()">Print Record</button>
        </div>
    </div>

    <script>
        let database = [];
        function switchTab(tab) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.tabs button').forEach(b => b.classList.remove('active'));
            document.getElementById(tab + '-view').classList.add('active');
            document.getElementById('btn-' + tab + '-tab').classList.add('active');
        }

        function renderTable() {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            database.forEach(record => {
                const tr = document.createElement('tr');
                tr.innerHTML = `<td>${record.controlNo}</td><td>${record.date}</td>
                <td>
                    <button class="action-btn" onclick="viewRecord('${record.id}')">VIEW</button>
                </td>`;
                tbody.appendChild(tr);
            });
        }

        function viewRecord(id) {
            const modal = document.getElementById('viewModal');
            modal.style.display = 'block';
           .
        }

        function closeModal() {
            document.getElementById('viewModal').style.display = 'none';
        }
        
        
    </script>
</body>
</html>
